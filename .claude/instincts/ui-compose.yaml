# UI (Compose + Decompose) 规范

## Action

- 主题: 使用 `AppTheme.colors` / `AppTheme.typography` / `AppTheme.shapes`，项目已移除 Material3
- 组件: 使用 `AppButton` / `AppText` / `AppCard` / `AppScaffold` / `AppTopBar` 等 App* 组件（`presentation/component/`）
- 导航: 使用 `Route` 定义路由（`presentation/navigation/Route.kt`），RootComponent 调用 `navigation.push/pop`
- 添加新路由: 只需在 `Route` sealed interface 添加条目，然后在 `RootComponent.createChild` 和 `Child` 添加对应分支
- Feature 结构: Component + Content，有状态加 Store
- HomeComponent 导航: 使用单一 `onNavigate(Route)` 回调，不为每个目标创建独立回调
- Content 和 App* 公共组件必须有 `@Preview`（Content 用 `PreviewWrapper`，组件直接包 `AppTheme`）
- `@Preview` 是 Roborazzi 自动扫描的入口，缺 Preview = 无视觉回归保护
- 图片: 网络用 `AsyncImage`，本地用 `painterResource`
- AsyncImage 必须设置固定尺寸（`size` / `width`+`height`），禁止仅用 `widthIn(max=)` / `heightIn(max=)`——加载前尺寸不确定会导致布局抖动

### Preview (layoutlib) 兼容

- layoutlib 不支持 SQLite 等平台重依赖，Feature Module DI 需按 `isInPreview` 分支注册纯内存实现
- 依赖 `ContextProvider` / 三方 SDK 的初始化代码必须加 `isInPreview` 守卫
- Mock 数据初始化必须同步，禁止 `scope.launch`，否则快照时数据为空

## Forbidden

- 禁止使用 `androidx.compose.material3` 的任何组件或主题 API，项目已完全移除该依赖
- 通用禁止项见 `forbidden.yaml`
