    "com.example.archshowcase.presentation.component.*",
    // a-shared: Component shells without business logic
    "com.example.archshowcase.presentation.demo.DefaultDemoRootComponent*",
    "com.example.archshowcase.presentation.demo.DemoRootComponent*",
    "com.example.archshowcase.presentation.main.DefaultMainComponent*",
    "com.example.archshowcase.presentation.main.TmpTabComponent*",
    "com.example.archshowcase.presentation.main.MainTab",
    // a-shared: NavigationStackManager (Decompose Navigation dependency)
    "com.example.archshowcase.presentation.navigation.NavigationStackManager*",
    // a-shared: chat Component shells (Store tested; shell logic is navigation delegation)
    "com.example.archshowcase.presentation.chat.list.DefaultConversationListComponent*",
    "com.example.archshowcase.presentation.chat.room.DefaultChatRoomComponent*",
    // a-shared: chat Compose UI widgets (pure presentation)
    "com.example.archshowcase.presentation.chat.widget.*",
    // a-platform: chat data layer (mock, DAO, platform drivers, DI, models, mapper)
