    "com.example.archshowcase.payment.*",
    "com.example.archshowcase.network.api.*",
    "com.example.archshowcase.auth.*",
    "com.example.archshowcase.im.*",
    "com.example.archshowcase.rtc.*",
    "com.example.archshowcase.devicetoken.*",
    "com.example.archshowcase.attribution.*",
    "com.example.archshowcase.user.*",
    "com.example.archshowcase.network.header.*",
    "com.example.archshowcase.data.settings.*",
    // a-core: platform expect/actual
    "com.example.archshowcase.core.util.ScreenshotCapture",
