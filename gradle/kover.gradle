    "com.example.archshowcase.chat.stress.*",
    // a-platform: network interceptors (SDK bridge + ktor pipeline)
    "com.example.archshowcase.network.interceptor.*",
    // a-platform: SQLDelight generated code (query wrappers + schema)
    "com.example.archshowcase.chat.db.*",
    // a-core: analytics platform actuals (expect/actual, not testable in commonTest)
    "com.example.archshowcase.core.analytics.AppLifecycleTracker",
    // a-core: analytics config (data class + trivial sampling lookup)
    "com.example.archshowcase.core.analytics.AnalyticsConfig",
    // a-core: analytics Compose modifier wrappers (appClickable etc., no branching logic)
    "com.example.archshowcase.core.analytics.AppInteractionKt",
    // a-core: analytics sealed class data models (data class boilerplate: equals/hashCode/copy/toString)
    "com.example.archshowcase.core.analytics.model.*",
    // KSP generated event mappers
    "*EventMapperRegistry*",
    "*EventMapper*",
    // KSP generated exposure params
    "*ExposureParamsRegistry*",
    "*ExposureParamsKt",
    // a-core: infra without unit tests
    "com.example.archshowcase.core.di.*",
    "com.example.archshowcase.core.scheduler.*",
    // a-core: OBOEffect Compose runtime infra (OBOScheduler tested separately)
    "com.example.archshowcase.core.compose.OBOEffect*",
    "com.example.archshowcase.core.compose.exposure.ExposureLazyColumn*",
    "com.example.archshowcase.core.compose.exposure.TrackExposure*",
