def jacocoVersion = "0.8.11"

dependencies {
    kover(project(":a-core"))
    kover(project(":a-platform"))
    kover(project(":a-shared"))
}

subprojects {
    pluginManager.withPlugin("org.jetbrains.kotlinx.kover") {
        kover {
            useJacoco(jacocoVersion)
        }
    }
}

def excludedClasses = [
    "*.BuildConfig",
    "*.ComposableSingletons*",
    "*_Factory",
    // KSP generated (+ inner classes)
    "*StoreExportStrategy*",
    "*StoreFactoryHelpersKt*",
    "*GeneratedExportStrategiesKt*",
    "*IntentResolverKt*",
    "*StateFields*",
    // Platform actuals
    "*Platform_*Kt*",
    "*DesktopPlatform*",
    "*AndroidPlatform*",
    "*TimeTravelExporter_*Kt*",
    // Android-only utils (+ inner classes)
    "*ContextProvider*",
    "*PermissionHelper*",
    "*PermissionUtilKt*",
    // Compose Content lambda inner classes
    "*ContentKt*",
    // Koin DI modules
    "*ModuleKt*",
    // Kotlin interface default impls
    "*DefaultImpls",
    // Private Composable-only data classes
    "*.Conversation",
    // InitialStateResolver: deep paths depend on global timeTravelController singleton
    "*.InitialStateResolver",
    // ScrollRestoreEffect Composable 内部编译器生成类（Flow/Continuation lambda）
    "*ScrollRestoreEffectKt*",
    // ScrollPosition data class 伴生对象
    "*ScrollPosition*Companion",
    // Log 工具类：纯基础设施，测试无业务价值
    "com.example.archshowcase.core.util.Log",
    // AppConfig：纯 var 配置属性，不含业务逻辑
    "com.example.archshowcase.core.AppConfig",

    // === Package-level exclusions (as class wildcards) ===
    // Note: Kover 0.9.7 Groovy DSL has no packages() method in filters.excludes.
    // Use classes("pkg.*") instead. The * wildcard matches dots, so subpackages are included.

    // a-shared: resources, DI, i18n, preview
    "com.example.archshowcase.resources.*",
    "com.example.archshowcase.di.*",
    "com.example.archshowcase.i18n.*",
    "com.example.archshowcase.presentation.preview.*",
    // a-shared: pure Component shells without logic
    "com.example.archshowcase.presentation.demo.crash.*",
    "com.example.archshowcase.presentation.demo.adaptive.*",
    // a-shared: login (Store tested; Component shells excluded)
    "com.example.archshowcase.presentation.login.DefaultLoginComponent*",
    "com.example.archshowcase.presentation.login.DefaultEmailLoginComponent*",
    // a-platform: auth (LoginRepository thin delegate, KoinComponent)
    "com.example.archshowcase.auth.DefaultLoginRepository*",
