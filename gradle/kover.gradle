    "com.example.archshowcase.core.trace.user.*",
    "com.example.archshowcase.core.trace.export.strategies.*",
]

def excludedAnnotations = [
    "*.Generated*",
    "androidx.compose.runtime.Composable",
]

kover {
    useJacoco(jacocoVersion)
    reports {
        filters {
            excludes {
                classes(*excludedClasses as String[])
                annotatedBy(*excludedAnnotations as String[])
            }
        }
        total {
            // Duplicate filters: Kover 0.9.7 may not inherit reports.filters into total.
            // Keep explicit to ensure koverVerify uses the correct exclusions.
            filters {
                excludes {
                    classes(*excludedClasses as String[])
                    annotatedBy(*excludedAnnotations as String[])
                }
            }
            verify {
                rule {
                    minBound(80)
                }
            }
        }
    }
}
